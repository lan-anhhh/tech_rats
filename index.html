<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="app" id="app">
    <header class="nav">
      <div class="nav-inner">
        <a class="brand" href="#gallery" id="brandLink">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1 id="museumName">World Paintings Museum</h1>
            <div class="sub" id="museumTagline">A quiet place for loud masterpieces.</div>
          </div>
        </a>

        <nav class="nav-links" aria-label="Primary">
          <button class="navlink" data-route="gallery" id="navGallery" aria-current="page"></button>
          <button class="navlink" data-route="my" id="navMy"></button>
        </nav>

        <div class="nav-actions">
          <button class="lang-btn" id="langToggle" title="Language"></button>
          <div class="pill" title="User">
            <span aria-hidden="true">👤</span>
            <span class="user" id="userNickname"></span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="hero">
        <div>
          <h2 id="heroTitle"></h2>
          <p id="heroSubtitle"></p>
        </div>
        <div class="meta" aria-label="Highlights">
          <span class="tag" id="tagIdentity"></span>
          <span class="tag" id="tagLocal"></span>
          <span class="tag" id="tagMobile"></span>
        </div>
      </div>

      <section class="page active" id="page-gallery" data-page="gallery">
        <div class="section-title">
          <h3 id="galleryTitle"></h3>
          <p class="hint" id="galleryHint"></p>
        </div>
        <div class="grid" id="galleryGrid" aria-label="Painting gallery"></div>
      </section>

      <section class="page" id="page-my" data-page="my">
        <div class="section-title">
          <h3 id="myTitle"></h3>
          <p class="hint" id="myHint"></p>
        </div>
        <div class="grid" id="myGrid" aria-label="My gallery"></div>
        <div class="empty" id="myEmpty" style="display:none;"></div>
      </section>
    </main>
  </div>

  <!-- Welcome modal -->
  <div class="backdrop" id="welcomeBackdrop" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
    <div class="modal">
      <div class="modal-head">
        <h3 id="welcomeTitle"></h3>
        <p id="welcomeText"></p>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="field">
            <label id="nickLabel" for="nickInput"></label>
            <input id="nickInput" autocomplete="nickname" maxlength="24" />
            <div class="tiny" id="nickHint"></div>
          </div>
          <div class="modal-actions">
            <button class="btn primary" id="welcomeSave"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Guide panel -->
  <div class="guide-wrap" aria-hidden="false">
    <aside class="guide" id="guidePanel" aria-label="Audio guide">
      <div class="guide-head">
        <div style="min-width:0;">
          <h3 id="guideTitle"></h3>
          <div class="meta" id="guideMeta"></div>
        </div>
        <button class="btn icon-btn" id="guideClose" title="Close">✕</button>
      </div>
      <div class="guide-body" id="guideBody"></div>
    </aside>
  </div>

  <!-- Drawing overlay -->
  <div class="draw-overlay" id="drawOverlay" role="dialog" aria-modal="true" aria-label="Drawing editor">
    <div class="draw-shell">
      <div class="draw-topbar">
        <div class="draw-title">
          <h3 id="drawTitle"></h3>
          <p id="drawSubtitle"></p>
        </div>
        <div class="draw-actions">
          <button class="btn" id="drawSave"></button>
          <button class="btn" id="drawDownload"></button>
          <button class="btn danger" id="drawClose"></button>
        </div>
      </div>

      <div class="draw-stage">
        <div class="stage-frame" id="stageFrame">
          <div class="stage-bg" id="stageBg" aria-hidden="true"></div>
          <div class="sig stage-sig" id="stageSig" aria-hidden="true"></div>
          <canvas id="drawCanvas"></canvas>
        </div>
      </div>

      <div class="draw-toolbar">
        <div class="toolgroup">
          <h4 id="toolColor"></h4>
          <div class="palette" id="colorPalette"></div>
          <div class="tiny" id="toolTip"></div>
        </div>
        <div class="toolgroup">
          <h4 id="toolBrush"></h4>
          <div class="seg" id="brushSizes"></div>
        </div>
        <div class="toolgroup">
          <h4 id="toolEdit"></h4>
          <div class="seg" id="editTools"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox for saved images -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Saved drawing">
    <div class="lightbox-inner">
      <div class="lightbox-top">
        <div class="info">
          <b id="lightboxTitle"></b>
          <span id="lightboxSubtitle"></span>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
          <button class="btn danger" id="lightboxDelete"></button>
          <button class="btn" id="lightboxClose"></button>
        </div>
      </div>
      <div class="lightbox-img">
        <img id="lightboxImg" alt="" />
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
